name: "HVLab 02b — Post-Bootstrap (ISOs + Arc)"

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  SUBSCRIPTION_ID: "00cd4357-ed45-4efb-bee0-10c467ff994b"
  RESOURCE_GROUP: "rg-hvlab-mms26-eus-01"

jobs:
  post-bootstrap:
    name: Post-Bootstrap (ISOs + Arc)
    runs-on: [self-hosted, hvlab-host]
    steps:
      - uses: actions/checkout@v4

      - name: Download evaluation ISOs
        shell: pwsh
        run: '& ./hyperv-cluster-demo/scripts/deploy/00-download-isos.ps1'
        continue-on-error: true

      - name: Install Azure Arc Connected Machine Agent
        shell: pwsh
        run: |
          & ./hyperv-cluster-demo/scripts/deploy/07-install-arc.ps1 `
            -SubscriptionId "${{ env.SUBSCRIPTION_ID }}" `
            -ResourceGroup "${{ env.RESOURCE_GROUP }}"
        continue-on-error: true

      - name: Summary
        shell: pwsh
        run: |
          '## Post-Bootstrap Complete' | Out-File $env:GITHUB_STEP_SUMMARY -Append
          'ISOs and Arc steps completed or were allowed to continue.' | Out-File $env:GITHUB_STEP_SUMMARY -Append
          'Next step: HVLab 03 - Deploy Nested VMs' | Out-File $env:GITHUB_STEP_SUMMARY -Append