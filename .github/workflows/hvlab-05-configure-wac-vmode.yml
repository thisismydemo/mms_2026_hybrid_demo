name: "HVLab 05 — Configure WAC Virtualization Mode"

on:
  workflow_dispatch:

jobs:
  configure-wac-vmode:
    name: Install and configure WAC vmode on hvwac01
    runs-on: [self-hosted, hvlab-host]
    steps:
      - uses: actions/checkout@v4

      - name: "Install WAC Virtualization Mode (WS2025 only)"
        shell: pwsh
        run: hyperv-cluster-demo/scripts/configure/04-configure-wac-vmode.ps1

      - name: "Add cluster hosts to WAC vmode"
        shell: pwsh
        run: |
          # Verify all hosts are visible in WAC vmode
          $hosts = @('hvnode01','hvnode02','hvnode03','hvnode04','hviscsi01','hvdc01')
          Write-Host "WAC vmode managed hosts: $($hosts -join ', ')"
          Write-Host "Verify connectivity at https://10.250.1.46 (hvwac01 external IP)"

      - name: Summary
        shell: pwsh
        run: |
          "## ✅ WAC Virtualization Mode Configured" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "- WAC vmode installed on hvwac01 (WS2025)" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "- PostgreSQL database configured" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "- All cluster hosts added as managed nodes" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "- Access at: **https://10.250.1.46** (from VNet or on-prem via BGP)" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "⚠️  TLS cert is self-signed (60-day expiry during preview)" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "**Next step:** Run **HVLab 06 — Configure SCVMM**" | Out-File $env:GITHUB_STEP_SUMMARY -Append
