name: "HVLab 00 — Repo Preflight"

on:
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region used for ARM validation"
        required: true
        default: "eastus"
      vm_size:
        description: "VM size used for ARM validation"
        required: true
        default: "Standard_M32ms"
        type: choice
        options:
          - Standard_M32ms
          - Standard_E48ds_v5
          - Standard_E104ids_v5
          - Standard_E96ds_v5
          - Standard_E64ds_v5

env:
  SUBSCRIPTION_ID: "00cd4357-ed45-4efb-bee0-10c467ff994b"
  RESOURCE_GROUP: "rg-hvlab-mms26-eus-01"

permissions:
  id-token: write
  contents: read

jobs:
  preflight:
    name: Validate repo before deployment
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          }

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Run preflight validation
        shell: pwsh
        run: |
          hyperv-cluster-demo/scripts/validate/Invoke-HVLabPreflight.ps1 `
            -SubscriptionId "${{ env.SUBSCRIPTION_ID }}" `
            -ResourceGroup "${{ env.RESOURCE_GROUP }}" `
            -Location "${{ github.event.inputs.location || 'eastus' }}" `
            -VmSize "${{ github.event.inputs.vm_size || 'Standard_M32ms' }}"